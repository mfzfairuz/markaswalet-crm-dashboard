# Cloud Build config — auto-deploy backend ke Cloud Run
# Trigger: push ke branch main (atau branch lain sesuai setting trigger)
#
# Override password DB via Trigger UI (Advanced → Substitution variables)
# kalau tidak mau default-nya di-commit.

substitutions:
  _REGION: asia-southeast2
  _SERVICE: markaswalet-api
  _DB_USER: markaswalet_app
  _DB_NAME: markaswalet_crm
  _DB_PASS: Markas2026          # override via trigger UI untuk production
  _CLOUDSQL_INSTANCE: markaswalet-db

steps:
  # 1. Build image dari backend/
  - id: Build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}:latest
      - ./backend

  # 2. Push image (semua tag)
  - id: Push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/${_SERVICE}

  # 3. Deploy ke Cloud Run
  - id: Deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=$PROJECT_ID:${_REGION}:${_CLOUDSQL_INSTANCE}
      - --set-env-vars=DB_USER=${_DB_USER},DB_PASS=${_DB_PASS},DB_NAME=${_DB_NAME},DB_SOCKET=/cloudsql/$PROJECT_ID:${_REGION}:${_CLOUDSQL_INSTANCE}
      - --memory=512Mi
      - --quiet

images:
  - gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID
  - gcr.io/$PROJECT_ID/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
